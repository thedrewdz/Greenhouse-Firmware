; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs = platformio.local.ini

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf

; Local runtime configuration.
; Prefer setting real values in a local override file or via CLI build flags.
; Example:
;   pio run -e esp32dev --project-option="build_flags=-DGH_WIFI_SSID=\"MySsid\" -DGH_WIFI_PASSWORD=\"MyPass\" -DGH_MQTT_BROKER_URI=\"mqtt://192.168.1.50\""
;
; build_flags =
;   -DGH_WIFI_SSID=\"REPLACE_ME\"
;   -DGH_WIFI_PASSWORD=\"REPLACE_ME\"
;   -DGH_MQTT_BROKER_URI=\"mqtt://REPLACE_ME\"
